<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 340px; font-family: "Segoe UI", sans-serif; background: #0f1216; color: #e6e9ef; }
    header { background: #181c23; padding: 12px 14px; border-bottom: 1px solid #2a313c; }
    header h1 { font-size: 15px; }
    header p { font-size: 11px; color: #8b94a3; margin-top: 2px; }
    .body { padding: 14px; }
    .score-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .score-circle { width: 54px; height: 54px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-size: 18px; font-weight: 700;
      border: 3px solid #4f8cff; flex-shrink: 0; }
    .score-high { border-color: #34d399; color: #34d399; }
    .score-mid  { border-color: #fbbf24; color: #fbbf24; }
    .score-low  { border-color: #8b94a3; color: #8b94a3; }
    .offer-info { flex: 1; overflow: hidden; }
    .offer-title { font-size: 13px; font-weight: 600; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; }
    .offer-sub { font-size: 11px; color: #8b94a3; margin-top: 2px; }
    .chips { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
    .chip { background: #1f242d; border: 1px solid #2a313c; border-radius: 10px;
      padding: 2px 7px; font-size: 11px; }
    .chip.ok  { border-color: #34d399; color: #34d399; }
    .chip.mis { border-color: #f87171; color: #f87171; }
    .actions { display: flex; gap: 8px; flex-direction: column; }
    button { border: none; border-radius: 8px; padding: 9px; font-size: 13px;
      cursor: pointer; width: 100%; }
    .btn-save   { background: #4f8cff; color: #fff; }
    .btn-open   { background: #1f242d; color: #e6e9ef; border: 1px solid #2a313c; }
    .btn-dis    { background: #1f242d; color: #8b94a3; border: 1px solid #2a313c; font-size: 12px; }
    button:hover { filter: brightness(1.1); }
    .msg { font-size: 12px; color: #8b94a3; margin-top: 8px; text-align: center; }
    .err { color: #f87171; }
    #loading { padding: 24px; text-align: center; color: #8b94a3; font-size: 13px; }
    #no-cv { padding: 16px; text-align: center; }
    #no-cv a { color: #4f8cff; font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <h1>🎯 JobHunter</h1>
    <p id="source-label">Wczytywanie...</p>
  </header>
  <div class="body">
    <div id="loading">Analizuję ofertę...</div>
    <div id="no-cv" style="display:none">
      Brak profilu CV.<br/>
      <a href="http://127.0.0.1:8001" target="_blank">Wgraj CV w aplikacji →</a>
    </div>
    <div id="main" style="display:none">
      <div class="score-row">
        <div class="score-circle" id="score-circle">–</div>
        <div class="offer-info">
          <div class="offer-title" id="offer-title">–</div>
          <div class="offer-sub" id="offer-sub">–</div>
        </div>
      </div>
      <div class="chips" id="chips"></div>
      <div class="actions">
        <button class="btn-save" id="btn-save">💾 Zapisz do trackera</button>
        <button class="btn-open" id="btn-open">🔗 Otwórz w JobHunter</button>
        <button class="btn-dis"  id="btn-dis">👎 Ignoruj tę ofertę</button>
      </div>
      <div class="msg" id="msg"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
